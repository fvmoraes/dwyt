name: Release

on:
  push:
    branches: [ main ]
    paths:
      - "core/**"
      - "install.sh"
      - ".github/workflows/release.yml"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: core/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: core/web/package-lock.json

      - name: Build frontend
        run: |
          cd core/web
          npm ci
          npm run build

      - name: Commit frontend build
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add core/internal/server/dashboard/dist/
          git diff --staged --quiet || git commit -m "chore: update frontend build"

      - name: Generate version and changelog
        id: version
        run: |
          # Get previous tag or start from v0.0.0
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")

          # Get commit messages since last tag
          if [ "$PREV_TAG" = "v0.0.0" ]; then
            COMMITS=$(git log --pretty=format:"%s" --no-merges)
          else
            COMMITS=$(git log --pretty=format:"%s" --no-merges "${PREV_TAG}..HEAD")
          fi

          # Determine version bump
          MAJOR=0
          MINOR=0

          if echo "$COMMITS" | grep -qiE "^(BREAKING CHANGE|breaking):"; then
            MAJOR=1
          elif echo "$COMMITS" | grep -qiE "^(feat|feature):"; then
            MINOR=1
          fi

          # Parse previous version
          PREV_VERSION=${PREV_TAG#v}
          IFS='.' read -r PREV_MAJOR PREV_MINOR PREV_PATCH <<< "$PREV_VERSION"
          PREV_PATCH=${PREV_PATCH:-0}

          # Calculate new version
          if [ $MAJOR -eq 1 ]; then
            NEW_VERSION="$((PREV_MAJOR + 1)).0.0"
          elif [ $MINOR -eq 1 ]; then
            NEW_VERSION="${PREV_MAJOR}.$((PREV_MINOR + 1)).0"
          else
            NEW_VERSION="${PREV_MAJOR}.${PREV_MINOR}.$((PREV_PATCH + 1))"
          fi

          NEW_TAG="v${NEW_VERSION}"

          # If tag already exists, keep bumping patch until we find a free one
          while git rev-parse "$NEW_TAG" >/dev/null 2>&1; do
            PREV_PATCH=$((PREV_PATCH + 1))
            NEW_VERSION="${PREV_MAJOR}.${PREV_MINOR}.$((PREV_PATCH + 1))"
            NEW_TAG="v${NEW_VERSION}"
          done

          echo "new_tag=${NEW_TAG}" >> $GITHUB_OUTPUT
          echo "prev_tag=${PREV_TAG}" >> $GITHUB_OUTPUT

          # Generate changelog
          echo "# Release ${NEW_TAG}" > /tmp/changelog.md
          echo "" >> /tmp/changelog.md
          echo "**Released:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> /tmp/changelog.md
          echo "**Previous version:** ${PREV_TAG}" >> /tmp/changelog.md
          echo "" >> /tmp/changelog.md
          echo "## Changes" >> /tmp/changelog.md
          echo "" >> /tmp/changelog.md

          # Categorize commits
          BREAKING=""
          FEATURES=""
          FIXES=""
          DOCS=""
          CHORES=""
          OTHER=""

          while IFS= read -r commit; do
            [ -z "$commit" ] && continue
            if echo "$commit" | grep -qiE "^(BREAKING CHANGE|breaking):"; then
              BREAKING="${BREAKING}- ${commit#*: }"$'\n'
            elif echo "$commit" | grep -qiE "^(feat|feature):"; then
              FEATURES="${FEATURES}- ${commit#*: }"$'\n'
            elif echo "$commit" | grep -qiE "^(fix|bugfix):"; then
              FIXES="${FIXES}- ${commit#*: }"$'\n'
            elif echo "$commit" | grep -qiE "^(docs|doc):"; then
              DOCS="${DOCS}- ${commit#*: }"$'\n'
            elif echo "$commit" | grep -qiE "^(chore|build|ci):"; then
              CHORES="${CHORES}- ${commit#*: }"$'\n'
            else
              OTHER="${OTHER}- ${commit}"$'\n'
            fi
          done <<< "$COMMITS"

          if [ -n "$BREAKING" ]; then
            echo "### 🚨 Breaking Changes" >> /tmp/changelog.md
            echo "" >> /tmp/changelog.md
            echo "$BREAKING" >> /tmp/changelog.md
          fi
          if [ -n "$FEATURES" ]; then
            echo "### ✨ Features" >> /tmp/changelog.md
            echo "" >> /tmp/changelog.md
            echo "$FEATURES" >> /tmp/changelog.md
          fi
          if [ -n "$FIXES" ]; then
            echo "### 🐛 Bug Fixes" >> /tmp/changelog.md
            echo "" >> /tmp/changelog.md
            echo "$FIXES" >> /tmp/changelog.md
          fi
          if [ -n "$DOCS" ]; then
            echo "### 📚 Documentation" >> /tmp/changelog.md
            echo "" >> /tmp/changelog.md
            echo "$DOCS" >> /tmp/changelog.md
          fi
          if [ -n "$CHORES" ]; then
            echo "### 🔧 Chores" >> /tmp/changelog.md
            echo "" >> /tmp/changelog.md
            echo "$CHORES" >> /tmp/changelog.md
          fi
          if [ -n "$OTHER" ]; then
            echo "### 📝 Other Changes" >> /tmp/changelog.md
            echo "" >> /tmp/changelog.md
            echo "$OTHER" >> /tmp/changelog.md
          fi

          echo "" >> /tmp/changelog.md
          echo "## Installation" >> /tmp/changelog.md
          echo "" >> /tmp/changelog.md
          echo '```bash' >> /tmp/changelog.md
          echo 'curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | bash' >> /tmp/changelog.md
          echo '```' >> /tmp/changelog.md
          echo "" >> /tmp/changelog.md
          echo "Or download the binary for your platform from the assets below." >> /tmp/changelog.md
          echo "" >> /tmp/changelog.md
          echo "## Checksums" >> /tmp/changelog.md
          echo "" >> /tmp/changelog.md
          echo "SHA256 checksums are available in \`checksums.txt\`." >> /tmp/changelog.md

          {
            echo "changelog<<EOF"
            cat /tmp/changelog.md
            echo "EOF"
          } >> $GITHUB_OUTPUT

          echo "Generated version: ${NEW_TAG}"

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.new_tag }}" -m "Release ${{ steps.version.outputs.new_tag }}"
          git push origin "${{ steps.version.outputs.new_tag }}"

      - name: Wait for tag to propagate
        run: sleep 5

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --skip=validate
          workdir: core
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update release with changelog
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.new_tag }}
          body: ${{ steps.version.outputs.changelog }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
