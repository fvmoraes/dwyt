# .goreleaser.yaml — DWYT Orchestrator
version: 2

project_name: dwyt

before:
  hooks:
    - go mod tidy

builds:
  - id: linux-amd64
    goos: [linux]
    goarch: [amd64]
    main: ./main.go
    binary: dwyt
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: linux-arm64
    goos: [linux]
    goarch: [arm64]
    main: ./main.go
    binary: dwyt
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: darwin-amd64
    goos: [darwin]
    goarch: [amd64]
    main: ./main.go
    binary: dwyt
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: darwin-arm64
    goos: [darwin]
    goarch: [arm64]
    main: ./main.go
    binary: dwyt
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: windows-amd64
    goos: [windows]
    goarch: [amd64]
    main: ./main.go
    binary: dwyt
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats: [tar.gz]
    name_template: "dwyt_{{.Os}}_{{.Arch}}"
  - id: windows
    formats: [zip]
    name_template: "dwyt_{{.Os}}_{{.Arch}}"
    builds: [windows-amd64]

checksum:
  name_template: "checksums.txt"

release:
  draft: true
  replace_existing_draft: true
